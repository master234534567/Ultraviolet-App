<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nebula</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05070f;color:#f0f2ff;font-family:'DM Sans',sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.center{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;padding:2rem;transition:opacity .4s,transform .4s}
.center.hidden{opacity:0;pointer-events:none;transform:translateY(-20px)}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(90deg,#818cf8,#c084fc,#38bdf8,#818cf8);background-size:300% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:flow 4s linear infinite}
@keyframes flow{0%{background-position:0%}100%{background-position:300%}}
.ring{padding:2px;border-radius:16px;
  background:linear-gradient(90deg,#818cf8,#c084fc,#38bdf8,#fb7185,#818cf8);background-size:400% 100%;
  animation:flow 3s linear infinite;
  box-shadow:0 0 60px rgba(129,140,248,.25),0 0 120px rgba(192,132,252,.1);
  width:100%;max-width:620px}
.box{display:flex;align-items:center;background:#090c1a;border-radius:14px;padding:0 .6rem 0 1.3rem;gap:.7rem}
input{flex:1;background:none;border:none;outline:none;color:#f0f2ff;font-family:'DM Sans',sans-serif;font-size:1rem;padding:1rem 0;caret-color:#818cf8}
input::placeholder{color:#3d4a6b}
button{background:linear-gradient(135deg,#818cf8,#c084fc);color:#fff;border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.15em;
  padding:.68rem 1.4rem;border-radius:11px;white-space:nowrap;transition:opacity .2s,transform .1s}
button:hover{opacity:.85;transform:scale(1.03)}
button:active{transform:scale(.97)}
.hints{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}
.hint{font-size:.72rem;color:#3d4a6b;cursor:pointer;padding:.2rem .55rem;border-radius:6px;
  border:1px solid transparent;transition:all .2s}
.hint:hover{color:#818cf8;border-color:rgba(129,140,248,.3);background:rgba(129,140,248,.07)}

/* PROXY FRAME */
.frame-wrap{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;background:#000;transition:opacity .3s}
.frame-wrap.hidden{opacity:0;pointer-events:none}
.bar{display:flex;align-items:center;gap:.4rem;padding:.5rem .85rem;background:#090c1a;border-bottom:1px solid rgba(140,160,255,0.1);flex-shrink:0}
.bn{background:#0f1428;border:1px solid rgba(140,160,255,0.12);color:#8892b0;border-radius:7px;padding:.28rem .65rem;cursor:pointer;font-size:.9rem;transition:all .15s}
.bn:hover{color:#f0f2ff;background:#151c38}
.burl{flex:1;font-size:.72rem;color:#8892b0;background:#0f1428;border:1px solid rgba(140,160,255,0.12);border-radius:7px;padding:.35rem .75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:monospace}
.bcls{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.28);color:#fb7185;border-radius:7px;padding:.28rem .85rem;cursor:pointer;font-family:'Syne',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;transition:background .2s}
.bcls:hover{background:rgba(251,113,133,.22)}
iframe{flex:1;border:none;width:100%}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="center" id="home">
  <h1>NEBULA</h1>
  <div class="ring">
    <div class="box">
      <input id="q" placeholder="Enter URL or search anything..." autocomplete="off" spellcheck="false"/>
      <button id="go">GO →</button>
    </div>
  </div>
  <div class="hints">
    <span class="hint" data-q="youtube.com">YouTube</span>
    <span class="hint" data-q="discord.com">Discord</span>
    <span class="hint" data-q="reddit.com">Reddit</span>
    <span class="hint" data-q="twitch.tv">Twitch</span>
    <span class="hint" data-q="spotify.com">Spotify</span>
    <span class="hint" data-q="google.com">Google</span>
    <span class="hint" data-q="instagram.com">Instagram</span>
    <span class="hint" data-q="tiktok.com">TikTok</span>
  </div>
</div>

<div class="frame-wrap hidden" id="fw">
  <div class="bar">
    <button class="bn" id="bk">←</button>
    <button class="bn" id="fw2">→</button>
    <button class="bn" id="rl">↺</button>
    <div class="burl" id="burl">about:blank</div>
    <button class="bn" id="nt">⧉</button>
    <button class="bcls" id="cls">✕ HOME</button>
  </div>
  <iframe id="fr" allow="fullscreen;autoplay;clipboard-write;encrypted-media"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-pointer-lock allow-storage-access-by-user-activation">
  </iframe>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/js/register-sw.js"></script>
<script>
// Canvas bg
(()=>{
  const c=document.getElementById('bg'),x=c.getContext('2d');
  let W,H,p=[],t=0;
  function init(){W=c.width=innerWidth;H=c.height=innerHeight;
    p=Array.from({length:160},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.1,vy:(Math.random()-.5)*.1,r:Math.random()*1.4+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.005+.001}))}
  function draw(){x.clearRect(0,0,W,H);
    [[W*.2,H*.25,280,'rgba(129,140,248,0.07)'],[W*.8,H*.7,240,'rgba(192,132,252,0.06)'],[W*.5,H*.45,200,'rgba(56,189,248,0.05)']].forEach(([bx,by,br,bc])=>{
      const g=x.createRadialGradient(bx,by,0,bx,by,br);g.addColorStop(0,bc);g.addColorStop(1,'transparent');
      x.fillStyle=g;x.beginPath();x.arc(bx,by,br,0,Math.PI*2);x.fill()});
    p.forEach(s=>{const a=.1+.5*Math.sin(t*s.sp+s.ph);x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle=`rgba(200,215,255,${a})`;x.fill();s.x+=s.vx;s.y+=s.vy;if(s.x<0)s.x=W;if(s.x>W)s.x=0;if(s.y<0)s.y=H;if(s.y>H)s.y=0});
    t++;requestAnimationFrame(draw)}
  init();draw();addEventListener('resize',init);
})();

// Proxy
const home=document.getElementById('home');
const fw=document.getElementById('fw');
const fr=document.getElementById('fr');
const burl=document.getElementById('burl');
let cur='';

function buildUrl(raw){
  let u=raw.trim();
  if(!/^https?:\/\//.test(u)&&!/^[\w-]+\.[a-z]{2,}/.test(u))
    u='https://www.google.com/search?q='+encodeURIComponent(u);
  else if(!/^https?:\/\//.test(u))u='https://'+u;
  if(typeof __uv$config!=='undefined')return __uv$config.prefix+__uv$config.encodeUrl(u);
  return u;
}

function launch(raw){
  cur=raw;burl.textContent=raw;fr.src=buildUrl(raw);
  fw.classList.remove('hidden');home.classList.add('hidden');
}
function goHome(){
  fw.classList.add('hidden');home.classList.remove('hidden');
  fr.src='about:blank';cur='';
}

document.getElementById('go').onclick=()=>{const v=document.getElementById('q').value.trim();if(v)launch(v)};
document.getElementById('q').onkeydown=e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v)launch(v)}};
document.querySelectorAll('.hint').forEach(h=>h.onclick=()=>{document.getElementById('q').value=h.dataset.q;launch(h.dataset.q)});
document.getElementById('cls').onclick=goHome;
document.getElementById('bk').onclick=()=>{try{fr.contentWindow.history.back()}catch(_){}};
document.getElementById('fw2').onclick=()=>{try{fr.contentWindow.history.forward()}catch(_){}};
document.getElementById('rl').onclick=()=>{fr.src=fr.src};
document.getElementById('nt').onclick=()=>window.open(buildUrl(cur),'_blank');

// Panic key
const pk=localStorage.getItem('pk')||'Escape';
document.addEventListener('keydown',e=>{if(e.key===pk&&!e.ctrlKey&&!e.metaKey)location.replace(localStorage.getItem('pu')||'https://classroom.google.com')});
</script>
</body>
</html>
